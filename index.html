
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripzy AI | Smart Itinerary Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    :root {
        --primary: #ff7e5f;
        --secondary: #feb47b;
        --dark: #1e3c72;
        --success: #2ecc71;
        --light-bg: #f8f9fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        color: white;
    }

    .container {
        width: 100%;
        max-width: 1000px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 { text-align: center; margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
    }

    input, select {
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        font-size: 14px;
        outline: none;
    }

    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }

    button {
        flex: 1;
        padding: 16px;
        border-radius: 12px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-generate { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 126, 95, 0.4); }

    .btn-pdf { background: var(--success); color: white; display: none; }

    #loading {
        display: none;
        text-align: center;
        padding: 20px;
        font-style: italic;
        color: var(--secondary);
    }

    /* Result Card Styling */
    .result-card {
        margin-top: 30px;
        background: #ffffff;
        color: #333;
        padding: 35px;
        border-radius: 18px;
        display: none;
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* General Markdown Elements */
    .result-card h2 { color: var(--dark); margin: 30px 0 15px 0; border-bottom: 2px solid var(--primary); display: inline-block; }
    .result-card table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; border-radius: 8px; overflow: hidden; }
    .result-card th, .result-card td { border: 1px solid #eee; padding: 12px; text-align: left; }
    .result-card th { background: #f2f2f2; color: var(--dark); }

    /* DAY-WISE SECTION STYLING */
    .result-card h3 {
        background: var(--light-bg);
        color: var(--dark);
        padding: 15px 20px;
        border-radius: 12px;
        margin-top: 25px;
        border-left: 6px solid var(--primary);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        display: block;
        width: 100%;
    }

    /* FOOD SECTION STYLING */
    .result-card table:nth-of-type(2) {
        border-left: 6px solid var(--success);
        background: #f9fffb;
    }
    
    .result-card h2:nth-of-type(2) {
        color: #27ae60;
        border-bottom: 2px solid var(--success);
    }

    /* Spacing for Lists */
    .result-card ul { padding-left: 25px; margin: 15px 0; }
    .result-card li { margin-bottom: 8px; }

    footer { text-align: center; margin-top: 30px; opacity: 0.6; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
    <h1>🌍 Tripzy AI <span style="font-weight:300">| Travel Planner</span></h1>

    <div class="form-grid">
        <input type="text" id="current_city" placeholder="From (e.g. Pune)">
        <input type="text" id="destination_city" placeholder="To (e.g. Nagpur)">
        <input type="number" id="days" placeholder="No. of Days">
        <input type="text" id="budget" placeholder="Budget (e.g. ₹5000)">
        <select id="style">
            <option value="Backpacker">Backpacker (Budget)</option>
            <option value="Comfort" selected>Comfort (Standard)</option>
            <option value="Luxury">Luxury (Premium)</option>
        </select>
    </div>

    <div class="btn-group">
        <button class="btn-generate" onclick="generateItinerary()">Generate My Plan</button>
        <button id="pdfBtn" class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div id="loading">✨ Curating your unique experience...</div>

    <div id="result" class="result-card"></div>

    <footer>Built with ❤️ for APCOER Project Expo</footer>
</div>

<script>
    async function generateItinerary() {
        const payload = {
            current_city: document.getElementById("current_city").value,
            destination_city: document.getElementById("destination_city").value,
            days: parseInt(document.getElementById("days").value),
            budget: document.getElementById("budget").value,
            style: document.getElementById("style").value
        };

        if (!payload.current_city || !payload.destination_city || !payload.days) {
            alert("Please fill in all fields!"); return;
        }

        const resDiv = document.getElementById("result");
        const loader = document.getElementById("loading");
        const pdfBtn = document.getElementById("pdfBtn");

        loader.style.display = "block";
        resDiv.style.display = "none";
        pdfBtn.style.display = "none";

        try {
            const response = await fetch("https://tripzy-ai-1.onrender.com/generate-itinerary", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            // Converts AI Markdown into Styled HTML Sections
            resDiv.innerHTML = marked.parse(data.itinerary);
            resDiv.style.display = "block";
            pdfBtn.style.display = "block";
        } catch (error) {
            alert("Error: Backend server not found. Run your FastAPI app!");
        } finally {
            loader.style.display = "none";
        }
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const content = document.getElementById("result").innerText;

        doc.setFont("helvetica", "bold");
        doc.text("Tripzy AI: Your Travel Plan", 10, 15);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);

        const lines = doc.splitTextToSize(content, 180);
        doc.text(lines, 10, 25);
        doc.save("Travel_Itinerary.pdf");
    }
</script>

</body>
</html>
